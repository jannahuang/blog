<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ topic.title }}</title>
    <link rel="stylesheet" href="/static/css/new_blog.css">
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/lib/editor/editor.css">
    <link rel="stylesheet" href="/static/lib/webuploader/webuploader.css">
    <script src="/static/lib/jquery-3.0.0.min.js"></script>
    <script src="/static/lib/markdownit.js"></script>
    <script src="/static/lib/webuploader/webuploader.withoutimage.js"></script>
    <script src="/static/lib/editor/editor.js"></script>
    <script src="/static/lib/editor/ext.js"></script>
</head>

<body>
    <nav>
        <div class="header-name">
             JannaHuang's Blog
         </div>
        <ul>
            <li class="selected"><a href="/">主页</a></li>
            <li><a href="/login">登陆</a></li>
        </ul>
    </nav>

    <p class="header-img">
        Shoot for the moon, even if you miss, you will land on the star.
    </p>

    <div id="tableContainer">
        <div id="tableRow">

            <div id="left-bar">
                <p class="beanheading">
                    <header class="text-centered">
                        <img class="avatar" src="https://cdn2.iconfinder.com/data/icons/rcons-user/32/male-shadow-circle-512.png">

                    </header>
                    <div class="text-centered">
                        <h3>JannaHuang</h3>
                        <p><b>终身学习，持续行动</b></p>
                        <span>
                            向成为优秀的码农进发。
                            <br>
                            <br>
                            愿你回首往事时，不会因虚度年华而悔恨，也不会因碌碌无为而羞耻。
                        </span>
                    </div>
                </p>
            </div>

            <div id="main">
                <div id="content">
                    <div class='panel'>
                        <div class='header topic_header'>
            <span class="topic_full_title">
                {{ topic.title }}
            </span>
                            <div class="changes">
                <span>
                    发布于 {{ topic.ct }}
                </span>
                                <span>
                    作者
                    <a href="/">jannahuang</a>
                </span>
                                <span>
                    {{ topic.views }} 次浏览
                </span>
                            </div>
                        </div>

                        <div class='inner topic'>
                            <div class='topic_content'>
                                <div class="markdown-text">
                                    <p>{{ topic.content }}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        Copyright © beta 版 2019, Janna Huang
    </footer>
</body>
</html>
